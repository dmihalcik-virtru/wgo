name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install jj (Jujutsu)
        shell: bash
        run: |
          set -euo pipefail
          # Fetch the latest jj release tarball from GitHub. No version pin
          # by design (gh-21 constraint) — the schema-drift smoke test in
          # internal/jj catches breaking template changes at PR time.
          asset_url="$(
            curl -fsSL https://api.github.com/repos/jj-vcs/jj/releases/latest \
              | grep -E '"browser_download_url".*x86_64-unknown-linux-musl.tar.gz"' \
              | head -n1 \
              | sed -E 's/.*"(https[^"]+)".*/\1/'
          )"
          if [ -z "$asset_url" ]; then
            echo "could not locate a jj x86_64-unknown-linux-musl asset"
            exit 1
          fi
          echo "Downloading $asset_url"
          curl -fsSL "$asset_url" -o /tmp/jj.tar.gz
          mkdir -p /tmp/jj-extract
          tar -xzf /tmp/jj.tar.gz -C /tmp/jj-extract
          # Locate the jj binary inside the extracted tree and move it to PATH.
          jj_bin="$(find /tmp/jj-extract -type f -name jj | head -n1)"
          if [ -z "$jj_bin" ]; then
            echo "jj binary not found in extracted tarball"
            exit 1
          fi
          install -m 0755 "$jj_bin" /usr/local/bin/jj
          jj --version

      - name: Verify formatting
        shell: bash
        run: |
          set -euo pipefail
          files="$(git ls-files '*.go')"
          if [ -z "$files" ]; then
            exit 0
          fi

          unformatted="$(gofmt -l $files)"
          if [ -n "$unformatted" ]; then
            echo "The following files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Verify go.mod and go.sum are tidy
        shell: bash
        run: |
          set -euo pipefail
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "go mod tidy produced changes. Run 'go mod tidy' locally and commit the result."
            exit 1
          fi

      - name: Build
        run: go build ./cmd/wgo

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: $(go env GOPATH)/bin/govulncheck ./...
